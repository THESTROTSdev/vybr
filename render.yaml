services:
  - type: web
    name: vybr
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python vybr_web.py
    envVars:
      - key: PORT
        value: 10000
      - key: PYTHON_VERSION
        value: 3.11.0
    plan: free
    healthCheckPath: /
    autoDeploy: true
